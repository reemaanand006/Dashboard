<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | City Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-stack">
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">
            <i data-lucide="{% if category == 'success' %}check-circle{% else %}alert-circle{% endif %}"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main class="login-shell">
        <section class="login-card reveal is-visible">
            <div class="login-brand">
                <div class="logo-box">
                    <i data-lucide="activity" class="logo-icon"></i>
                </div>
                <div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to access your operations dashboard</p>
                </div>
            </div>

            <form id="loginForm" method="POST" class="login-form" data-no-transition="true" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input id="email" type="email" name="email" autocomplete="email" placeholder="admin@example.com" required>
                    </div>
                    <p id="emailError" class="field-error" role="alert"></p>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock"></i>
                        <input id="password" type="password" name="password" autocomplete="current-password" placeholder="Enter your password" required>
                    </div>
                    <p id="passwordError" class="field-error" role="alert"></p>
                </div>

                <button id="loginSubmitBtn" type="submit" class="btn primary-btn large-btn login-submit-btn">
                    <i data-lucide="loader-2" class="login-spinner"></i>
                    <span class="login-btn-text">Sign In</span>
                </button>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
